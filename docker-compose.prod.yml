services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/server_billing.db
      APP_SECRET_KEY_FILE: /app/secrets/session.key
      APP_ENCRYPTION_KEY_WRAP_FILE: /app/secrets/encryption.key.wrap
      PANEL_KEY_PASSPHRASE_FILE: ${PANEL_KEY_PASSPHRASE_FILE:-/app/secrets/unlock.passphrase}
      # Legacy до wrap-encryption-key.sh: APP_ENCRYPTION_KEY_FILE=/app/secrets/encryption.key
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-172.16.0.0/12}
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro

  scheduler:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.reminders"]
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/server_billing.db
      APP_SECRET_KEY_FILE: /app/secrets/session.key
      APP_ENCRYPTION_KEY_WRAP_FILE: /app/secrets/encryption.key.wrap
      PANEL_KEY_PASSPHRASE_FILE: ${PANEL_KEY_PASSPHRASE_FILE:-/app/secrets/unlock.passphrase}
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
    depends_on:
      - app

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INSTALL_DIR: /opt/server-billing
      UPDATER_TOKEN: ${APP_UPDATE_TOKEN:-}
    volumes:
      - .:/opt/server-billing
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  caddy_data:
  caddy_config:
